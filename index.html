<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .upload-area {
            border: 2px dashed var(--tg-theme-hint-color);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: var(--tg-theme-button-color);
        }
        .upload-area.dragover {
            border-color: var(--tg-theme-button-color);
            background: rgba(0,0,0,0.05);
        }
        .file-list {
            list-style: none;
            padding: 0;
            margin-top: 16px;
        }
        .file-list li {
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 8px;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn-primary {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }
        .btn-primary:active { opacity: 0.7; }
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📁 Отправьте ZIP файл чтобы переделать в APK</h2>
        <p style="color: var(--tg-theme-hint-color); font-size: 14px;">
            Отправьте ZIP файл чтобы переделать в APK
        </p>

        <input type="file" id="fileInput" multiple style="display:none" accept=".zip,.apk,.py,.js,.html,.css,.txt,.json,.xml">

        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div style="font-size:48px;">📤</div>
            <div style="margin-top:12px;font-size:18px;font-weight:500;">Нажми или перетащи</div>
            <div style="color:var(--tg-theme-hint-color);font-size:14px;margin-top:4px;">
                Поддерживаются любые файлы
            </div>
        </div>

        <ul class="file-list" id="fileList"></ul>

        <button class="btn btn-primary hidden" id="sendBtn" onclick="sendFiles()">
            📤 Отправте ZIP файлы чтобы переделать в APK
        </button>

        <button class="btn btn-secondary" onclick="clearFiles()">
            🗑️ Очистить
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileList = document.getElementById('fileList');
        const sendBtn = document.getElementById('sendBtn');

        const selectedFiles = [];

        // Выбор через клик
        fileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            });
            updateUI();
        });

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            files.forEach(file => {
                if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            });
            updateUI();
        });

        function updateUI() {
            fileList.innerHTML = selectedFiles.map((file, index) => `
                <li>
                    <span>
                        📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)
                    </span>
                    <span onclick="removeFile(${index})" style="cursor:pointer;color:red;">✕</span>
                </li>
            `).join('');

            if (selectedFiles.length > 0) {
                sendBtn.classList.remove('hidden');
                sendBtn.textContent = `📤 Отправить ${selectedFiles.length} файл${selectedFiles.length > 1 ? 'а' : ''}`;
            } else {
                sendBtn.classList.add('hidden');
            }
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateUI();
        }

        function clearFiles() {
            selectedFiles.length = 0;
            fileInput.value = '';
            updateUI();
            tg.showAlert('✅ Файлы очищены');
        }

        function sendFiles() {
            if (selectedFiles.length === 0) return;

            // Отправляем через WebApp
            const fileNames = selectedFiles.map(f => f.name);
            const fileSizes = selectedFiles.map(f => f.size);

            tg.sendData(JSON.stringify({
                action: 'send_files',
                files: fileNames,
                sizes: fileSizes
            }));

            tg.showAlert(`📤 Отправляю ${selectedFiles.length} файл${selectedFiles.length > 1 ? 'а' : ''}...`);

            // Закрываем WebApp
            setTimeout(() => tg.close(), 1000);
        }
    </script>
</body>
</html>
